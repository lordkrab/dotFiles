set-option -g default-command "arch -arch arm64 /bin/zsh"

# use <prefix> s for horizontal split
bind s split-window -v -c '#{pane_current_path}'
# use <prefix> v for vertical split
bind v split-window -h -c '#{pane_current_path}'

# Underline which window is selected
set -g window-status-current-style "underscore"

# Dim inactive panes
set -g window-style 'bg=colour235'
set -g window-active-style 'bg=terminal'

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# vim-like search
setw -g mode-keys vi

# Use v to trigger selection    
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Use y to yank current selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

# Scroll line-by-line with C-j / C-k (like C-e / C-y)
bind-key -T copy-mode-vi C-j send-keys -X scroll-down
bind-key -T copy-mode-vi C-k send-keys -X scroll-up

### Shell popup
bind n display-popup -d "#{pane_current_path}" -w 60% -h 70% -E "tmux new-session -A -s popup -c '#{pane_current_path}'"

### Scratch popup
bind m display-popup -w 60% -h 70% -E "tmux new-session -A -s scratch 'mkdir -p $HOME/.scratch && nvim $HOME/.scratch/$(date +%Y-%m-%d).md'"

### Lazygit popup
bind g display-popup -d "#{pane_current_path}" -w 100% -h 100% -E "tmux new-session -A -s lazygit -c '#{pane_current_path}' 'lazygit'"

### Taskwarrior-tui popups
bind t display-popup -w 60% -h 70% -E "tmux new-session -A -s taskwarrior 'taskwarrior-tui'"
bind T display-menu -T "Tasks" \
    "Completed" c "display-popup -w 60% -h 70% -E \"tmux new-session -A -s tw-completed 'taskwarrior-tui -r completed'\"" \
    "Notes"     n "display-popup -w 60% -h 70% -E \"tmux new-session -A -s tw-notes 'taskwarrior-tui -r notes'\""

### Session management
bind C command-prompt "new-session -s '%%'"
bind w choose-tree -Zs

bind -n C-l send-keys C-l \; run-shell "tmux clear-history"

# resize panes more easily (-r = repeatable without prefix)
bind -r < resize-pane -L 1
bind -r > resize-pane -R 1
bind -r - resize-pane -D 1
bind -r + resize-pane -U 1
# vim-like pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# make ctrl+a replace ctrl+b
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Big history
set -g history-limit 100000

# Make search behavior more like vim
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

bind C command-prompt "new-session -s '%%'"
bind -n C-s copy-mode

bind-key -n C-z resize-pane -Z

# Do this to force learning ctrl s
unbind [

# Prevent prefix+Space from cycling layouts
unbind Space

# Use prefix + ; to go to previous window
bind \; last-window

# ===================
# TPM Plugins
# ===================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# Continuum settings - auto save & restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

